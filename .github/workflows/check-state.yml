name: Check current server state
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp
      - name: Inspect /htdocs
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          OPT="set ftp:ssl-allow false; set ftp:passive-mode true;"
          echo "===== /htdocs 直下（更新日時つき）====="
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "$OPT cls -l /htdocs/; bye" 2>/dev/null | head -60
          echo ""
          for f in index.html contact.html about.html business.html recruit.html technology.html; do
            echo "===== /htdocs/$f の判定 ====="
            c=$(lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "$OPT cat /htdocs/$f; bye" 2>/dev/null)
            if [ -z "$c" ]; then echo "(ファイルなし)"; continue; fi
            echo "title: $(printf '%s' "$c" | grep -io '<title>[^<]*</title>' | head -1)"
            if printf '%s' "$c" | grep -q 'G-54DCFCLL2R'; then echo "→ 新HP（GAコードあり）"; fi
            if printf '%s' "$c" | grep -qi 'style.css?v='; then echo "→ 新HP（style.css?v= あり）"; fi
            if printf '%s' "$c" | grep -qi 'tayori-form-wrap'; then echo "→ 新HP（Tayori iframe埋め込み）"; fi
            if printf '%s' "$c" | grep -qi 'list-inline-item'; then echo "→ 旧HP（Bootstrap list-inline-item）"; fi
            if printf '%s' "$c" | grep -qi 'tayori.com/form' && ! printf '%s' "$c" | grep -qi 'tayori-form-wrap'; then echo "→ 旧HP（Tayoriへのリンク）"; fi
          done
          echo ""
          echo "===== done ====="
