name: Cleanup temp workflows and branches
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove temp diagnostic workflows
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          for f in check-state inspect-oldhp find-css dump-oldhp render-check live-render cleanup-temp; do
            git rm -f .github/workflows/$f.yml 2>/dev/null || true
          done
          git commit -m "cleanup: 一時診断ワークフローを削除（旧HP応急復旧の後始末）" || echo "nothing to commit"
          git push origin main
      - name: Delete temp branches
        run: |
          for b in oldhp-snapshot oldhp-render live-render; do
            git push origin --delete $b 2>/dev/null && echo "deleted $b" || echo "(no $b)"
          done
