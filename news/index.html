<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="../images/logo.png" type="image/png">
  <link rel="apple-touch-icon" href="../images/logo.png">
  <title>新着情報｜長縄工務店</title>
  <meta name="description" content="長縄工務店の新着情報・お知らせ一覧。工事実績・採用情報・会社からのお知らせをご覧いただけます。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<!-- ヘッダー -->
<header class="header" id="top">
  <div class="inner header-inner">
    <a href="../index.html" class="logo">
      <img src="../images/logo.png" alt="長縄工務店 ロゴマーク" class="logo-img">
      <span class="logo-name">株式会社 長縄工務店</span>
    </a>
    <nav class="nav">
      <a href="../index.html">TOP</a>
      <a href="index.html" class="nav-active">新着情報</a>
      <a href="../business.html">事業内容</a>
      <a href="../technology.html">ICT施工・技術力</a>
      <a href="../recruit.html">採用情報</a>
      <a href="../about.html">会社情報</a>
      <a href="../contact.html">お問い合わせ</a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="メニューを開く">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="nav-mobile" id="nav-mobile">
    <a href="../index.html">TOP</a>
    <a href="index.html">新着情報</a>
    <a href="../business.html">事業内容</a>
    <a href="../technology.html">ICT施工・技術力</a>
    <a href="../recruit.html">採用情報</a>
    <a href="../about.html">会社情報</a>
    <a href="../contact.html">お問い合わせ</a>
  </div>
</header>

<main>

  <section class="section" style="padding-top: 120px;">
    <div class="inner">

      <!-- パンくず -->
      <nav class="breadcrumb" aria-label="パンくずリスト">
        <a href="../index.html">TOP</a>
        <span class="breadcrumb-sep">›</span>
        <span>新着情報</span>
      </nav>

      <div class="section-header">
        <p class="section-label">News</p>
        <h2 class="section-title">新着情報</h2>
      </div>

      <p class="news-empty">現在、新着情報はありません。</p>

    </div>
  </section>

</main>

<!-- フッター -->
<footer class="footer">
  <div class="inner footer-inner">
    <nav class="footer-nav">
      <a href="../index.html">TOP</a>
      <a href="index.html">新着情報</a>
      <a href="../business.html">事業内容</a>
      <a href="../technology.html">ICT施工・技術力</a>
      <a href="../recruit.html">採用情報</a>
      <a href="../about.html">会社情報</a>
      <a href="../contact.html">お問い合わせ</a>
    </nav>
    <p class="footer-copy">© 2026 長縄工務店. All rights reserved.</p>
  </div>
</footer>

<script>
  const hamburger = document.getElementById('hamburger');
  const navMobile = document.getElementById('nav-mobile');
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('open');
    navMobile.classList.toggle('open');
  });
  navMobile.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      hamburger.classList.remove('open');
      navMobile.classList.remove('open');
    });
  });
  const header = document.querySelector('.header');
  window.addEventListener('scroll', () => {
    header.classList.toggle('scrolled', window.scrollY > 60);
  });
</script>

</body>
</html>
