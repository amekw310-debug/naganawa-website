name: Find style.css on server
on:
  workflow_dispatch:
jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp
      - name: Search
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          OPT="set ftp:ssl-allow false; set ftp:passive-mode true;"
          run() { lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "$OPT $1; bye" 2>/dev/null; }
          echo "===== find all *style*.css under /htdocs (recursive) ====="
          run "find /htdocs" | grep -i 'style' | grep -i 'css' || echo "(none)"
          echo ""
          echo "===== /htdocs/test/ listing ====="
          run "cls -l /htdocs/test/" | head -60
          echo ""
          echo "===== /htdocs/test/ recursive (names) ====="
          run "find /htdocs/test" | head -80
          echo ""
          echo "===== any *.css backups under /htdocs top (name contains css) ====="
          run "cls -1 /htdocs/" | grep -i 'css' || echo "(none at top besides style.css)"
