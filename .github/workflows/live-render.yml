name: Live render check
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm i playwright@1.56.1 >/dev/null 2>&1
          npx playwright install --with-deps chromium
      - name: Shoot live pages
        run: |
          cat > live.js <<'JS'
          const { chromium } = require('playwright');
          (async () => {
            const b = await chromium.launch();
            const base='https://naganawa-k.co.jp/';
            const pages=[['','index'],['company.html','company'],['business.html','business'],['contact.html','contact'],['technology.html','technology']];
            for (const [path,name] of pages){
              const url=base+path+'?_cb='+Date.now();
              const pc=await b.newPage({viewport:{width:1280,height:900}});
              await pc.goto(url,{waitUntil:'load',timeout:90000}).catch(e=>console.log('goto err',name,e.message));
              await pc.waitForTimeout(4000);
              await pc.screenshot({path:name+'_pc.jpg',type:'jpeg',quality:72,fullPage:true});
              await pc.close();
              console.log('shot',name);
            }
            const sp=await b.newPage({viewport:{width:390,height:820},isMobile:true,deviceScaleFactor:2});
            await sp.goto(base+'?_cb='+Date.now(),{waitUntil:'load',timeout:90000}).catch(()=>{});
            await sp.waitForTimeout(4000);
            await sp.screenshot({path:'index_sp.jpg',type:'jpeg',quality:72,fullPage:true});
            await sp.close();
            await b.close();
          })().catch(e=>{console.error(e);process.exit(1)});
          JS
          node live.js
          ls -la *.jpg
      - name: Encode + commit
        run: |
          mkdir -p live
          for f in index_pc company_pc business_pc contact_pc technology_pc index_sp; do
            base64 -w0 ${f}.jpg > live/${f}.jpg.b64.txt
          done
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout -B live-render
          git add -f live/
          git commit -m "live render post-restore"
          git push -f origin live-render
