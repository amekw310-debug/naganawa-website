name: Dump old HP html to branch
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp
      - name: Download old HP files
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          OPT="set ftp:ssl-allow false; set ftp:passive-mode true;"
          mkdir -p oldhp-snapshot
          FILES="index.html.old0614 business.html.old0614 technology.html.old0614 company.html jobs.html onepoint.html policy.html professional.html qualification.html vision.html contact_confirm.html config.php.old"
          for f in $FILES; do
            lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "$OPT get /htdocs/$f -o oldhp-snapshot/$f; bye" 2>/dev/null && echo "got $f" || echo "MISS $f"
          done
          echo "===== images referenced =====" > oldhp-snapshot/_imagerefs.txt
          grep -rhoi 'images/[a-zA-Z0-9._/-]*' oldhp-snapshot/ 2>/dev/null | sort -u >> oldhp-snapshot/_imagerefs.txt || true
          echo "===== list images on server =====" >> oldhp-snapshot/_imagerefs.txt
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "$OPT find /htdocs/images; bye" 2>/dev/null | head -200 >> oldhp-snapshot/_imagerefs.txt || true
      - name: Commit to branch
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout -b oldhp-snapshot
          git add -f oldhp-snapshot/
          git commit -m "snapshot: 旧HP html for reconstruction"
          git push -f origin oldhp-snapshot
