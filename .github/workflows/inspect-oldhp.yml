name: Inspect old HP backups
on:
  workflow_dispatch:
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp
      - name: Inspect backups
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          OPT="set ftp:ssl-allow false; set ftp:passive-mode true;"
          catf() { lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "$OPT cat $1; bye" 2>/dev/null; }
          for f in index.html.old0614 business.html.old0614 technology.html.old0614 company.html vision.html; do
            echo "================= /htdocs/$f ================="
            c=$(catf /htdocs/$f)
            if [ -z "$c" ]; then echo "(なし)"; continue; fi
            echo "-- title:"; printf '%s' "$c" | grep -io '<title>[^<]*</title>' | head -1
            echo "-- link/css refs:"; printf '%s' "$c" | grep -io '<link[^>]*>' | head -20
            echo "-- script src refs:"; printf '%s' "$c" | grep -io '<script[^>]*src=[^>]*>' | head -20
            echo "-- markers:"
            printf '%s' "$c" | grep -q 'G-54DCFCLL2R' && echo "   [GAあり=新HP疑い]" || echo "   [GAなし=旧HP]"
            printf '%s' "$c" | grep -qi 'list-inline-item' && echo "   [list-inline-item=旧HP Bootstrap]"
            printf '%s' "$c" | grep -qi 'tayori' && echo "   [tayori言及あり]"
            echo "-- nav hrefs (.html):"; printf '%s' "$c" | grep -io 'href="[^"]*\.html"' | sort -u | head -40
          done
          echo "================= config.php.old (先頭のみ) ================="
          catf /htdocs/config.php.old | head -5
