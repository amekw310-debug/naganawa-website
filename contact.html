        <form class="contact-form" action="contact_mail.php" method="post">

          <div class="form-group">

          </div>
          <div class="form-group">

            <input type="email" id="f-email" name="email" class="form-input" placeholder="example@mail.com" required>

          <div class="form-group">

            <input type="text" id="f-occupation" name="occupation" class="form-input" placeholder="株式会社○○">

          <div class="form-group">
            <label class="form-label" for="f-education">お問い合わせ種別</label>

                <option value="お見積りのご依頼">お見積りのご依頼</option>
                <option value="採用に関するご質問">採用に関するご質問</option>
                <option value="その他">その他</option>

            </div>
          </div>
          <div class="form-group">

          <button type="submit" class="btn btn-accent btn-lg" style="width:100%;margin-top:20px;">確認画面へ</button>

<script>
  // ハンバーガーメニュー
  const hamburger = document.getElementById('hamburger');
  const navMobile = document.getElementById('nav-mobile');
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('open');
    navMobile.classList.toggle('open');
  });
  navMobile.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      hamburger.classList.remove('open');
      navMobile.classList.remove('open');
    });
  });

  // スクロール時ヘッダー背景
  const header = document.querySelector('.header');
  window.addEventListener('scroll', () => {
    header.classList.toggle('scrolled', window.scrollY > 60);
  }, { passive: true });
</script>
