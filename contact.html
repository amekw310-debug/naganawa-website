<main>

  <!-- お問い合わせ -->
  <section class="section section--gray" id="contact" style="padding-top:120px;">
    <div class="inner">
      <div class="section-header">
        <p class="section-label">Contact Us</p>
        <h2 class="section-title">お問い合わせ</h2>
      </div>
      <div style="max-width:640px;margin:0 auto;">
        <form class="contact-form" onsubmit="return false;">
          <div class="form-group">
            <label class="form-label">お名前<span class="form-required">必須</span></label>
            <input type="text" class="form-input" placeholder="山田 太郎">
          </div>
          <div class="form-group">
            <label class="form-label">会社名・団体名</label>
            <input type="text" class="form-input" placeholder="株式会社○○">
          </div>
          <div class="form-group">
            <label class="form-label">メールアドレス<span class="form-required">必須</span></label>
            <input type="email" class="form-input" placeholder="example@mail.com">
          </div>
          <div class="form-group">
            <label class="form-label">電話番号</label>
            <input type="tel" class="form-input" placeholder="000-0000-0000">
          </div>
          <div class="form-group">
            <label class="form-label">お問い合わせ種別<span class="form-required">必須</span></label>
            <div class="form-select-wrap">
              <select class="form-select">
                <option value="">選択してください</option>
                <option>工事・施工のご相談</option>
                <option>お見積りのご依頼</option>
                <option>採用に関するご質問</option>
                <option>その他</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">お問い合わせ内容<span class="form-required">必須</span></label>
            <textarea class="form-textarea" placeholder="お問い合わせ内容をご記入ください。"></textarea>
          </div>
          <p class="form-note">※ このフォームはデモです。実際の送信は行われません。</p>
          <button type="submit" class="btn btn-accent btn-lg" style="width:100%;margin-top:20px;">送信する</button>
        </form>
      </div>
    </div>
  </section>

</main>

  <div class="inner footer-inner">

  </div>
</footer>

<script>
  // ハンバーガーメニュー
  const hamburger = document.getElementById('hamburger');
  const navMobile = document.getElementById('nav-mobile');
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('open');
    navMobile.classList.toggle('open');
  });
  navMobile.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      hamburger.classList.remove('open');
      navMobile.classList.remove('open');
    });
  });

  // スクロール時ヘッダー背景
  const header = document.querySelector('.header');
  window.addEventListener('scroll', () => {
    header.classList.toggle('scrolled', window.scrollY > 60);
  }, { passive: true });
</script>
