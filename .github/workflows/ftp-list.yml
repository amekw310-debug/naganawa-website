name: FTP directory diagnose

# 一時的な診断用。FTPサーバーのフォルダ構成を調べ、
# index.html / contact_mail.php の場所（公開フォルダ）を特定します。
on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: List FTP tree
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "===== TOP LEVEL ( / ) ====="
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" \
            -e "set ftp:ssl-allow false; set ftp:passive-mode true; cls -l /; bye" || true
          echo ""
          echo "===== SEARCH for index.html / contact_mail.php ====="
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" \
            -e "set ftp:ssl-allow false; set ftp:passive-mode true; find /; bye" 2>/dev/null \
            | grep -iE 'index\.html$|contact_mail\.php$|style\.css$' | head -80 || true
          echo ""
          echo "===== FOLDER LIST (depth 2) ====="
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" \
            -e "set ftp:ssl-allow false; set ftp:passive-mode true; find -d 2 /; bye" 2>/dev/null \
            | grep '/$' | head -60 || true
